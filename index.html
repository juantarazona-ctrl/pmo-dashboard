<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio de Proyectos — PMO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#161922;--bg3:#1e2230;--bg4:#252a3a;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaf0;--text2:#9095a8;--text3:#5a5f72;--green:#22c55e;--green-bg:rgba(34,197,94,0.1);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);--red:#ef4444;--red-bg:rgba(239,68,68,0.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);--gray:#6b7280;--gray-bg:rgba(107,114,128,0.1);--accent:#6366f1;--accent-bg:rgba(99,102,241,0.12);--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{overflow-y:auto;padding:28px 32px}
.sb-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sb-logo-mark{font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.sb-logo-title{font-size:16px;font-weight:600;color:var(--text)}
.sb-section{padding:16px 12px 8px;font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;margin:1px 8px;color:var(--text2);font-size:13px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent)}
.sb-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;flex-shrink:0}
.sb-gestor-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px 4px 12px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:color 0.15s;margin:0 8px;border-radius:var(--radius-sm)}
.sb-gestor-hdr:hover{color:var(--text2);background:var(--bg3)}
.sb-gestor-chev{transition:transform 0.2s;font-size:10px}
.sb-gestor-chev.open{transform:rotate(90deg)}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}
.sb-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.sb-footer-text{font-size:11px;color:var(--text3)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.topbar-left h2{font-size:22px;font-weight:600;color:var(--text)}
.topbar-left p{font-size:13px;color:var(--text2);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s}
.btn:hover{background:var(--bg4);color:var(--text)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px}
.metric.danger .metric-value{color:var(--red)}
.metric.success .metric-value{color:var(--green)}
.metric.warn .metric-value{color:var(--amber)}
.metric.info .metric-value{color:var(--blue)}
.alert-banner{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px}
.alert-banner-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.alert-list{display:flex;flex-direction:column;gap:4px}
.alert-list-item{font-size:12px;color:#fca5a5;padding-left:12px;position:relative}
.alert-list-item::before{content:'·';position:absolute;left:0;color:var(--red)}
.section-title{font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.gantt-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.gantt-header{display:grid;grid-template-columns:260px 80px 80px 100px 1fr 90px;gap:0;border-bottom:1px solid var(--border);padding:9px 16px;background:var(--bg3)}
.gantt-header span{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.phase-row{border-bottom:1px solid var(--border)}
.phase-row:last-child{border-bottom:none}
.phase-hdr{display:grid;grid-template-columns:260px 80px 80px 100px 1fr 90px;gap:0;padding:10px 16px;cursor:pointer;transition:background 0.15s;align-items:center}
.phase-hdr:hover{background:var(--bg3)}
.ph-name-cell{display:flex;align-items:center;gap:8px}
.ph-chevron{width:16px;height:16px;border-radius:3px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--text3);transition:transform 0.2s}
.ph-chevron.open{transform:rotate(90deg)}
.ph-name{font-size:13px;font-weight:500;color:var(--text)}
.pct-cell{font-family:'DM Mono',monospace;font-size:12px;text-align:right;padding-right:16px}
.pct-plan{color:var(--text3)}
.pct-real-green{color:var(--green)}
.pct-real-amber{color:var(--amber)}
.pct-real-red{color:var(--red)}
.pct-real-gray{color:var(--text3)}
.status-cell{display:flex;justify-content:flex-end;padding-right:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-gray{background:var(--gray-bg);color:var(--gray)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-dot-green{background:var(--green)}
.badge-dot-red{background:var(--red)}
.badge-dot-amber{background:var(--amber)}
.badge-dot-gray{background:var(--gray)}
.gantt-cell{padding:0 4px}
.gantt-track{height:20px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.g-bar-plan{position:absolute;height:9px;top:1px;border-radius:2px;background:rgba(99,102,241,0.4)}
.g-bar-real{position:absolute;height:9px;bottom:1px;border-radius:2px}
.g-bar-green{background:rgba(34,197,94,0.7)}
.g-bar-amber{background:rgba(245,158,11,0.7)}
.g-bar-red{background:rgba(239,68,68,0.7)}
.g-bar-gray{background:rgba(107,114,128,0.4)}
.g-today{position:absolute;width:1px;top:0;bottom:0;background:rgba(99,102,241,0.8)}
.task-rows{border-top:1px solid var(--border)}
.task-row{display:grid;grid-template-columns:260px 80px 80px 100px 1fr 90px;gap:0;padding:7px 16px 7px 40px;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;transition:background 0.1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(255,255,255,0.02)}
.task-name-cell{display:flex;align-items:center;gap:8px;overflow:hidden}
.task-edt{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0;min-width:55px}
.task-name{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-name.retrasada{color:#fca5a5}
.task-atraso{font-size:10px;padding:1px 5px;border-radius:10px;background:var(--red-bg);color:var(--red);flex-shrink:0;margin-left:4px;white-space:nowrap}
.task-riesgo{font-size:10px;padding:1px 5px;border-radius:10px;background:var(--amber-bg);color:var(--amber);flex-shrink:0;margin-left:4px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-bottom:24px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all 0.15s}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.pc-pm{font-size:11px;color:var(--text3)}
.pc-gestor{font-size:11px;color:var(--text3);margin-top:1px}
.pc-pct-wrap{text-align:right}
.pc-pct-plan{font-size:10px;color:var(--text3)}
.pc-pct-real{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.pc-bar-bg{height:4px;background:var(--bg4);border-radius:2px;margin:10px 0 12px;position:relative}
.pc-bar-plan{position:absolute;top:0;left:0;height:4px;border-radius:2px;background:rgba(99,102,241,0.3)}
.pc-bar-real{position:absolute;top:0;left:0;height:4px;border-radius:2px}
.pc-footer{display:flex;justify-content:space-between;align-items:center}
.pc-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.gestor-section{margin-bottom:28px}
.gestor-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.gestor-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.detail-header{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.dh-name{font-size:20px;font-weight:600;color:var(--text)}
.dh-pm{font-size:13px;color:var(--text2);margin-top:3px}
.dh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dh-stat{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 14px}
.dh-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.dh-stat-value{font-size:16px;font-weight:600;font-family:'DM Mono',monospace}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;padding:6px 0;transition:color 0.15s}
.back-btn:hover{color:var(--text)}
.month-labels{display:flex;justify-content:space-between;padding:4px 20px 0;margin-bottom:4px}
.month-label{font-size:9px;color:var(--text3)}
.sync-banner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.sync-info{font-size:12px;color:var(--text2)}
.sync-info strong{color:var(--text);font-weight:500}
.sync-btn{font-size:12px;padding:6px 12px;background:var(--accent-bg);color:var(--accent);border:1px solid rgba(99,102,241,0.3);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s}
.sync-btn:hover{background:rgba(99,102,241,0.2)}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.config-box{background:var(--bg2);border:1px solid rgba(99,102,241,0.3);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px}
.config-box-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.config-row{display:grid;grid-template-columns:160px 1fr 80px;gap:8px;align-items:center;margin-bottom:8px}
.config-label{font-size:12px;color:var(--text2)}
.config-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;width:100%}
.config-input:focus{outline:none;border-color:var(--accent)}
.config-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">PMO Dashboard</div>
    <div class="sb-logo-title">Portfolio de Proyectos</div>
  </div>
  <div class="sb-section">Vista general</div>
  <div class="sb-item active" onclick="showPortfolio()" id="nav-portfolio">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="sb-item-name">Todos los proyectos</span>
    <span class="sb-item-badge" id="badge-total" style="background:var(--bg4);color:var(--text2)">—</span>
  </div>
  <div class="sb-item" onclick="showConfig()" id="nav-config">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    <span class="sb-item-name">Conectar Google Sheets</span>
  </div>
  <div class="sb-section">Proyectos activos</div>
  <div id="sb-projects"><div style="padding:12px 20px;font-size:12px;color:var(--text3)">Cargando...</div></div>
  <div class="sb-divider"></div>
  <div class="sb-footer">
    <div class="sb-footer-text">Actualizado desde Google Sheets</div>
    <div class="sb-footer-text" style="margin-top:2px;font-family:'DM Mono',monospace" id="last-update">—</div>
  </div>
</aside>
<main class="main" id="main-content">
  <div id="view-portfolio"></div>
  <div id="view-detail" style="display:none"></div>
  <div id="view-config" style="display:none"></div>
</main>
</div>

const eColor = e => e==='Completada'||e==='Verde'?'var(--green)':e==='Retrasada'?'var(--red)':e==='Amarillo'?'var(--amber)':'var(--gray)';
const eBadge = e => e==='Completada'||e==='Verde'?'badge-green':e==='Retrasada'?'badge-red':e==='Amarillo'?'badge-amber':'badge-gray';
const eDot   = e => e==='Completada'||e==='Verde'?'badge-dot-green':e==='Retrasada'?'badge-dot-red':e==='Amarillo'?'badge-dot-amber':'badge-dot-gray';
const eBar   = e => e==='Completada'||e==='Verde'?'g-bar-green':e==='Retrasada'?'g-bar-red':e==='Amarillo'?'g-bar-amber':'g-bar-gray';
const pctCls = (e,pp,pr) => e==='Tarea futura'?'pct-real-gray':pr>=pp?'pct-real-green':(pp-pr)>20?'pct-real-red':'pct-real-amber';
const gestorColors = {'Ana Torres':'#6366f1','Carlos Vega':'#22c55e','María Quispe':'#f59e0b'};
const gestorInitials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('');

gestores.forEach(g => sbExpanded[g] = true);

// ════════ SIDEBAR ════════
function buildSidebar() {
  document.getElementById('badge-total').textContent = projects.length;
  document.getElementById('last-update').textContent = new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const grouped = {};
  projects.forEach(p => { if(!grouped[p.gestor]) grouped[p.gestor]=[]; grouped[p.gestor].push(p); });
  let html = '';
  Object.entries(grouped).forEach(([gestor, projs]) => {
    const color = gestorColors[gestor]||'var(--text2)';
    const isOpen = sbExpanded[gestor]!==false;
    html += `<div class="sb-gestor-hdr" onclick="toggleGestor('${gestor}')">
      <div style="width:18px;height:18px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${color};flex-shrink:0">${gestorInitials(gestor)}</div>
      <span style="flex:1;color:${color}">${gestor}</span>
      <span class="sb-gestor-chev ${isOpen?'open':''}">›</span>
    </div>`;
    if(isOpen) {
      projs.forEach(p => {
        html += `<div class="sb-item ${currentProject&&currentProject.id===p.id?'active':''}" onclick="showProject('${p.id}')">
          <span class="sb-item-dot" style="background:${eColor(p.estado)}"></span>
          <span class="sb-item-name">${p.name}</span>
          <span class="sb-item-badge" style="background:${eColor(p.estado)}22;color:${eColor(p.estado)}">${p.pct_real}%</span>
        </div>`;
      });
    }
  });
  document.getElementById('sb-projects').innerHTML = html;
  document.getElementById('nav-portfolio').className = `sb-item ${currentView==='portfolio'?'active':''}`;
  document.getElementById('nav-config').className = `sb-item ${currentView==='config'?'active':''}`;
}

function toggleGestor(g){ sbExpanded[g]=!sbExpanded[g]; buildSidebar(); }

// ════════ PORTFOLIO ════════
function showPortfolio(){ currentProject=null; currentView='portfolio'; buildSidebar(); document.getElementById('view-detail').style.display='none'; document.getElementById('view-config').style.display='none'; document.getElementById('view-portfolio').style.display=''; renderPortfolio(); }

function renderPortfolio(){
  const total=projects.length, retrasados=projects.filter(p=>p.estado==='Retrasada').length, enRiesgo=projects.filter(p=>p.estado==='Amarillo').length, alDia=projects.filter(p=>p.estado==='Verde'||p.estado==='Completada').length, avgReal=Math.round(projects.reduce((a,p)=>a+p.pct_real,0)/total);
  const grouped = {};
  const filtered = filterEstado ? projects.filter(p=>p.estado===filterEstado) : projects;
  filtered.forEach(p => { if(!grouped[p.gestor]) grouped[p.gestor]=[]; grouped[p.gestor].push(p); });
  const hasSheets = Object.keys(SHEET_CONFIG).length > 0;
  const syncBanner = hasSheets ? `<div class="sync-banner"><div class="sync-info">Conectado a <strong>Google Sheets</strong> · Los datos se actualizan automáticamente al abrir</div><button class="sync-btn" onclick="loadFromSheets()">↻ Sincronizar ahora</button></div>` : `<div class="sync-banner"><div class="sync-info">Usando <strong>datos de ejemplo</strong> · <span style="color:var(--accent);cursor:pointer" onclick="showConfig()">Conecta tu Google Sheets</span> para ver datos reales</div></div>`;
  const gestorasHtml = Object.entries(grouped).map(([gestor, projs]) => {
    const color = gestorColors[gestor]||'var(--text2)';
    const cards = projs.map(p => {
      const gap = p.pct_plan - p.pct_real;
      return `<div class="proj-card" onclick="showProject('${p.id}')">
        <div class="pc-top">
          <div><div class="pc-name">${p.name}</div><div class="pc-pm">PM: ${p.pm}</div></div>
          <div class="pc-pct-wrap"><div class="pc-pct-plan">plan ${p.pct_plan}%</div><div class="pc-pct-real" style="color:${eColor(p.estado)}">${p.pct_real}%</div></div>
        </div>
        <div class="pc-bar-bg">
          <div class="pc-bar-plan" style="width:${p.pct_plan}%"></div>
          <div class="pc-bar-real" style="width:${p.pct_real}%;background:${eColor(p.estado)}"></div>
        </div>
        <div class="pc-footer">
          <div class="pc-dates">${p.fecha_inicio} → ${p.fecha_fin}</div>
          <span class="badge ${eBadge(p.estado)}"><span class="badge-dot ${eDot(p.estado)}"></span>${p.estado}${gap>0?' −'+gap+'%':''}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="gestor-section">
      <div class="gestor-title">
        <div class="gestor-avatar" style="background:${color}22;color:${color}">${gestorInitials(gestor)}</div>
        ${gestor} <span style="font-weight:400;color:var(--text3);font-size:12px">${projs.length} proyecto${projs.length>1?'s':''}</span>
      </div>
      <div class="portfolio-grid">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('view-portfolio').innerHTML = `
    <div class="topbar">
      <div class="topbar-left"><h2>Portfolio de proyectos</h2><p>${total} proyectos activos · Promedio de avance real: ${avgReal}%</p></div>
      <div class="topbar-right">
        <select style="background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer" onchange="filterEstado=this.value;renderPortfolio()">
          <option value="">Todos los estados</option>
          <option value="Retrasada" ${filterEstado==='Retrasada'?'selected':''}>Retrasados</option>
          <option value="Amarillo" ${filterEstado==='Amarillo'?'selected':''}>En riesgo</option>
          <option value="Verde" ${filterEstado==='Verde'?'selected':''}>Al día</option>
        </select>
      </div>
    </div>
    <div class="metrics">
      <div class="metric info"><div class="metric-label">Total activos</div><div class="metric-value">${total}</div><div class="metric-sub">en portfolio</div></div>
      <div class="metric"><div class="metric-label">Avance promedio</div><div class="metric-value" style="color:var(--text)">${avgReal}%</div><div class="metric-sub">avance real</div></div>
      <div class="metric success"><div class="metric-label">Al día</div><div class="metric-value">${alDia}</div><div class="metric-sub">${enRiesgo} en riesgo</div></div>
      <div class="metric danger"><div class="metric-label">Con atraso</div><div class="metric-value">${retrasados}</div><div class="metric-sub">acción requerida</div></div>
    </div>
    ${syncBanner}
    ${gestorasHtml}`;
}

        <div class="dh-stat"><div class="dh-stat-label">Avance esperado</div><div class="dh-stat-value" style="color:var(--text2)">${p.pct_plan}%</div></div>
        <div class="dh-stat"><div class="dh-stat-label">Avance real</div><div class="dh-stat-value" style="color:${eColor(p.estado)}">${p.pct_real}%</div></div>
        <div class="dh-stat"><div class="dh-stat-label">Brecha</div><div class="dh-stat-value" style="color:${gap>0?'var(--red)':'var(--green)'}">${gap>0?'−':'+'}${Math.abs(gap)}%</div></div>
        
      </div>
    </div>
    ${alertHtml}
    <div class="section-title">Cronograma — clic en cada fase para ver tareas</div>
    <div style="display:flex;gap:16px;font-size:10px;color:var(--text3);margin-bottom:8px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:rgba(99,102,241,0.4);border-radius:1px;display:inline-block"></span>Planificado</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:6px;background:var(--green);opacity:0.7;border-radius:1px;display:inline-block"></span>Real completado</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:1px;height:12px;background:rgba(99,102,241,0.8);display:inline-block"></span>Hoy</span>
    </div>
    <div class="month-labels">${months.map(m=>`<span class="month-label">${m}</span>`).join('')}</div>
    <div class="gantt-wrap">
      <div class="gantt-header"><span>Fase / Tarea</span><span style="text-align:right;padding-right:16px">Esp.</span><span style="text-align:right;padding-right:16px">Real</span><span style="text-align:right;padding-right:8px">Estado</span><div style="display:flex;justify-content:space-between;padding:0 4px">${months.map(m=>`<span>${m}</span>`).join('')}</div><span style="text-align:right">Fechas</span></div>
      ${ganttRows}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px">
        <div class="section-title" style="margin-bottom:8px">Resumen de tareas</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--green)">● Completadas</span><span style="font-family:'DM Mono',monospace">${completadas}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--red)">● Retrasadas</span><span style="font-family:'DM Mono',monospace">${retrasadas}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--gray)">● Futuras</span><span style="font-family:'DM Mono',monospace">${totalTasks-completadas-retrasadas}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;border-top:1px solid var(--border);padding-top:6px"><span style="color:var(--text2)">Total</span><span style="font-family:'DM Mono',monospace">${totalTasks}</span></div>
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px">
        <div class="section-title" style="margin-bottom:8px">Información del proyecto</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text3)">Gestor</span><span style="color:var(--text2)">${p.gestor}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text3)">PM</span><span style="color:var(--text2)">${p.pm}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text3)">Inicio</span><span style="color:var(--text2);font-family:'DM Mono',monospace">${p.fecha_inicio}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--text3)">Fin planificado</span><span style="color:var(--text2);font-family:'DM Mono',monospace">${p.fecha_fin}</span></div>
          
        </div>
      </div>
    </div>`;
}

function togglePhase(id){ expandedPhases[id]=!expandedPhases[id]; renderDetail(); }
