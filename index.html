<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio de Proyectos — PMO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161922;--bg3:#1e2230;--bg4:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#9095a8;--text3:#5a5f72;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --blue:#3b82f6;--purple:#8b5cf6;--gray:#6b7280;--accent:#6366f1;
  --radius:12px;--radius-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo-eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.sb-logo-title{font-size:15px;font-weight:600;color:var(--text)}
.sb-nav{padding:8px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:12px;transition:all .13s;margin-bottom:1px}
.sb-nav-item:hover{background:var(--bg3);color:var(--text)}
.sb-nav-item.active{background:rgba(99,102,241,.14);color:var(--accent);font-weight:500}
.sb-section{padding:16px 18px 6px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.sb-gestor{margin:1px 8px;border-radius:var(--radius-sm);overflow:hidden}
.sb-gestor-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .13s;user-select:none}
.sb-gestor-hdr:hover{background:var(--bg3)}
.sb-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sb-gestor-name{flex:1;font-size:12px;font-weight:600}
.sb-gestor-count{font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3)}
.sb-chev{font-size:11px;color:var(--text3);transition:transform .2s}
.sb-chev.open{transform:rotate(90deg)}
.sb-projects{overflow:hidden;transition:max-height .25s ease}
.sb-proj{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 22px;cursor:pointer;border-radius:var(--radius-sm);margin:1px 0;transition:background .13s}
.sb-proj:hover{background:var(--bg3)}
.sb-proj.active{background:rgba(99,102,241,.1)}
.sb-proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-proj-name{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-proj.active .sb-proj-name{color:var(--accent)}
.sb-proj-pct{font-size:10px;font-family:'DM Mono',monospace;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}
.sb-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.sb-footer-text{font-size:10px;color:var(--text3);line-height:1.7}
.main{overflow-y:auto;padding:28px 36px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.topbar h2{font-size:22px;font-weight:600}
.topbar p{font-size:13px;color:var(--text2);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.metric-val{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.m-red .metric-val{color:var(--red)}.m-green .metric-val{color:var(--green)}.m-blue .metric-val{color:var(--blue)}
.sync-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.sync-info{font-size:12px;color:var(--text2)}
.sync-btn{font-size:11px;padding:6px 12px;background:rgba(99,102,241,.12);color:var(--accent);border:1px solid rgba(99,102,241,.25);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .13s}
.sync-btn:hover{background:rgba(99,102,241,.22)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-green{background:rgba(34,197,94,.18);color:var(--green)}
.b-red{background:rgba(239,68,68,.12);color:var(--red)}
.b-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.b-gray{background:rgba(107,114,128,.12);color:var(--gray)}
.b-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* FILTER BAR */
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);white-space:nowrap}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .13s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.pill:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.pill.pill-active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.pill.pill-green.pill-active{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.3)}
.pill.pill-amber.pill-active{background:rgba(245,158,11,.15);color:var(--amber);border-color:rgba(245,158,11,.3)}
.pill.pill-red.pill-active{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.3)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.filter-sep{width:1px;height:32px;background:var(--border2);flex-shrink:0}
.filter-stats{display:flex;gap:10px;margin-left:auto}
.fstat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 14px;border-radius:var(--radius-sm);min-width:58px}
.fstat span:first-child{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.fstat span:last-child{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.fstat-green{background:rgba(34,197,94,.08);color:var(--green)}
.fstat-amber{background:rgba(245,158,11,.08);color:var(--amber)}
.fstat-red{background:rgba(239,68,68,.08);color:var(--red)}
/* PORTFOLIO */
.gestor-section{margin-bottom:32px}
.gestor-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.gestor-av-lg{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .15s}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pc-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.pc-pm{font-size:11px;color:var(--text3)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-pct-plan{font-size:10px;color:var(--text3);text-align:right;margin-bottom:2px}
.pc-pct-real{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;text-align:right;line-height:1}
.pc-track{height:4px;background:var(--bg4);border-radius:2px;margin:12px 0;position:relative}
.pc-bar-plan{position:absolute;top:0;left:0;height:4px;border-radius:2px;background:rgba(99,102,241,.3)}
.pc-bar-real{position:absolute;top:0;left:0;height:4px;border-radius:2px}
.pc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.pc-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
/* RESUMEN CARD */
.rsm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:border-color .15s}
.rsm-card:hover{border-color:var(--border2)}
.rsm-top{display:grid;grid-template-columns:1fr auto;gap:24px;padding:20px 24px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.rsm-top:hover{background:rgba(255,255,255,.015)}
.rsm-proj-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rsm-chev{width:18px;height:18px;border-radius:4px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rsm-chev.open{transform:rotate(90deg)}
.rsm-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.rsm-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rsm-stats{display:flex;align-items:center;gap:18px;flex-shrink:0}
.rsm-stat{text-align:center;min-width:50px}
.rsm-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.rsm-stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.rsm-divider{width:.5px;height:40px;background:var(--border2)}
.rsm-roadmap{padding:12px 24px 16px}





.rsm-overflow-phases{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 0 4px}
.rsm-overflow-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.rsm-overflow-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;cursor:default;white-space:nowrap;transition:filter .15s}
.rsm-overflow-pill:hover{filter:brightness(1.2)}
.rsm-gantt-inner{position:relative}
.rsm-month-axis{display:flex;border-bottom:1px solid var(--border);margin-bottom:10px;padding-bottom:4px}
.rsm-month-cell{flex:1;font-size:9px;font-weight:500;color:var(--text3);position:relative;min-width:28px;text-align:left}
.rsm-month-cell::before{content:'';position:absolute;left:0;top:-3px;bottom:0;width:.5px;background:var(--border)}
.rsm-gantt-rows{position:relative;display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.rsm-gantt-row{position:relative;height:34px}
.rsm-row-bg{position:absolute;top:0;left:0;right:0;height:100%;background:var(--bg4);border-radius:5px}
.rsm-seg{
  position:absolute;top:2px;height:30px;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;
  transition:filter .15s,box-shadow .15s;
  border:1px solid rgba(255,255,255,.08);
}
.rsm-seg:hover{filter:brightness(1.2);box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:10}
.rsm-seg-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;padding:0 6px;overflow:hidden;gap:1px;
}
.rsm-seg-name{
  font-size:9px;font-weight:600;
  color:rgba(255,255,255,.92);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  width:100%;text-align:center;line-height:1.2;
}
.rsm-seg-sub{
  font-size:8px;
  color:rgba(255,255,255,.6);
  font-family:'DM Mono',monospace;
  white-space:nowrap;line-height:1;
}
.rsm-seg-prog{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.35);border-radius:0 0 3px 3px}
/* Tooltip */
.rsm-tooltip{
  position:fixed;z-index:9999;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-size:12px;color:var(--text);
  pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  max-width:240px;
  display:none;
}
.rsm-tooltip.visible{display:block}
.rsm-tooltip-name{font-weight:600;margin-bottom:5px;color:var(--text)}
.rsm-tooltip-row{display:flex;justify-content:space-between;gap:16px;font-size:11px;margin-bottom:2px}
.rsm-tooltip-lbl{color:var(--text3)}
.rsm-tooltip-val{font-family:'DM Mono',monospace;font-weight:500}
.rsm-today{position:absolute;top:-6px;width:2px;background:var(--accent);opacity:.85;border-radius:1px;z-index:5;pointer-events:none}
.rsm-today::before{content:'Hoy';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:500;color:var(--accent);white-space:nowrap;font-family:'DM Sans',sans-serif}
.rsm-today::after{content:'▼';position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--accent)}
.rsm-date-range{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:6px}
/* EXPANDED PHASES in resumen */
.rsm-phases{border-top:1px solid var(--border);background:var(--bg3)}
.rsm-phases-hdr{display:grid;grid-template-columns:1fr 58px 58px 112px 190px 82px;padding:7px 24px;border-bottom:1px solid var(--border)}
.rsm-phases-hdr span{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.rsm-phase-row{display:grid;grid-template-columns:1fr 58px 58px 112px 190px 82px;padding:10px 24px;border-bottom:.5px solid rgba(255,255,255,.04);align-items:center;cursor:pointer;transition:background .1s}
.rsm-phase-row:last-child{border-bottom:none}
.rsm-phase-row:hover{background:rgba(255,255,255,.03)}
.rsm-phase-row.expanded{background:rgba(99,102,241,.05)}
.rsm-phase-name-cell{display:flex;align-items:center;gap:8px}
.rsm-phase-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.rsm-phase-edt{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.rsm-phase-name{font-size:12px;color:var(--text2);font-weight:500}
.rsm-ph-chev{width:14px;height:14px;background:var(--bg4);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);flex-shrink:0;transition:transform .18s}
.rsm-ph-chev.open{transform:rotate(90deg)}
.rsm-pct{font-family:'DM Mono',monospace;font-size:12px;text-align:right;padding-right:14px;color:var(--text3)}
.rsm-mini-wrap{position:relative;height:18px}
.rsm-mini-bg{position:absolute;top:3px;left:0;right:0;height:12px;background:var(--bg4);border-radius:3px;overflow:hidden;border:.5px solid var(--border)}
.rsm-mini-plan{position:absolute;top:0;height:5px;border-radius:1px;opacity:.4}
.rsm-mini-real{position:absolute;bottom:0;height:5px;border-radius:1px}
.rsm-mini-today{position:absolute;top:0;bottom:0;width:1px;background:var(--accent);opacity:.7}
.rsm-phase-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right;line-height:1.5}
/* TASK ROWS inside phase */
.rsm-task-rows{background:var(--bg2);border-top:.5px solid var(--border)}
.rsm-task-row{display:grid;grid-template-columns:1fr 58px 58px 112px 190px 82px;padding:7px 24px 7px 56px;border-bottom:.5px solid rgba(255,255,255,.03);align-items:center;transition:background .1s}
.rsm-task-row:last-child{border-bottom:none}
.rsm-task-row:hover{background:rgba(255,255,255,.02)}
.rsm-task-name-cell{display:flex;align-items:center;gap:6px;overflow:hidden}
.rsm-task-edt{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0}
.rsm-task-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rsm-task-name.late{color:#fca5a5}
.rsm-task-chip{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(239,68,68,.15);color:var(--red);flex-shrink:0;margin-left:3px;white-space:nowrap}
/* DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);transition:all .13s}
.back-btn:hover{color:var(--text);background:var(--bg3)}
.detail-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:20px}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.dh-name{font-size:21px;font-weight:600}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:8px}
.dh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dh-stat{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 16px}
.dh-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.dh-stat-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.alert-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px}
.alert-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.alert-item{font-size:12px;color:#fca5a5;padding:3px 0 3px 10px;position:relative}
.alert-item::before{content:'·';position:absolute;left:0;color:var(--red)}
.section-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.gantt-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.gantt-thead{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.gantt-thead span{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.phase-block{border-bottom:1px solid var(--border)}
.phase-block:last-child{border-bottom:none}
.phase-hdr{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:10px 14px;cursor:pointer;align-items:center;transition:background .12s}
.phase-hdr:hover{background:rgba(255,255,255,.025)}
.ph-name-cell{display:flex;align-items:center;gap:7px}
.ph-chev{width:16px;height:16px;background:var(--bg4);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);flex-shrink:0;transition:transform .18s}
.ph-chev.open{transform:rotate(90deg)}
.ph-name{font-size:12px;font-weight:500;color:var(--text)}
.pct-cell{font-family:'DM Mono',monospace;font-size:11px;text-align:right;padding-right:14px}
.pct-muted{color:var(--text3)}.pct-green{color:var(--green)}.pct-amber{color:var(--amber)}.pct-red{color:var(--red)}.pct-gray{color:var(--text3)}.pct-blue{color:var(--blue)}
.st-cell{display:flex;justify-content:flex-end;padding-right:6px}
.g-track{height:18px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.g-plan{position:absolute;height:8px;top:1px;border-radius:2px;background:rgba(99,102,241,.35)}
.g-real{position:absolute;height:8px;bottom:1px;border-radius:2px}
.g-today-l{position:absolute;width:1px;top:0;bottom:0;background:var(--accent);opacity:.7}
.task-rows{border-top:1px solid rgba(255,255,255,.04)}
.task-row{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:6px 14px 6px 36px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(255,255,255,.02)}
.task-name-cell{display:flex;align-items:center;gap:6px;overflow:hidden}
.task-edt{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0;min-width:52px}
.task-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-name.late{color:#fca5a5}
.task-chip{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(239,68,68,.15);color:var(--red);flex-shrink:0;margin-left:3px;white-space:nowrap}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.loading-overlay{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3);padding:8px 0;margin-bottom:12px}
.loading-spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* CONFIG */
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.config-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.code-block{background:var(--bg3);border-radius:var(--radius-sm);padding:14px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);line-height:2;overflow-x:auto}
.step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.step-num{width:20px;height:20px;border-radius:50%;background:rgba(99,102,241,.15);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rsm-gantt-outer{position:relative}
.rsm-tail{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.rsm-tail-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;width:100%;margin-bottom:2px}
.rsm-tail-item{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg4);border-radius:6px;border:1px solid var(--border)}
.rsm-tail-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.rsm-tail-name{font-size:11px;color:var(--text2);font-weight:500}
.rsm-tail-pct{font-size:10px;font-family:'DM Mono',monospace;margin-left:auto;padding-left:8px}
.rsm-tail-badge{font-size:9px;padding:1px 6px;border-radius:10px;white-space:nowrap}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
select{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
</style>

<script>

const GAS_PROXY_URL='https://script.google.com/macros/s/AKfycbww8KkViFYcZx2LkEHamu9Oqts-wfPs0EfJqNDBQ2xEbMTACXaP4g25ia8cHMT6zjVXuQ/exec';
const SHEET_CONFIG={
  'Cobranza Omnicanal - SAP':            'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpYfDYx3mFt77cJ0tAf8W84sLFQp66p1mkr2EU8pKcQ3ktRBH3GbwHqlqJDfylJ2jY1hO6ByI6XKVH/pub?gid=0&single=true&output=csv',
  'Escalera de Descuento':               'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpYfDYx3mFt77cJ0tAf8W84sLFQp66p1mkr2EU8pKcQ3ktRBH3GbwHqlqJDfylJ2jY1hO6ByI6XKVH/pub?gid=794965495&single=true&output=csv',

  'Validación Parentesco Fase2':         'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpYfDYx3mFt77cJ0tAf8W84sLFQp66p1mkr2EU8pKcQ3ktRBH3GbwHqlqJDfylJ2jY1hO6ByI6XKVH/pub?gid=1555503359&single=true&output=csv',
};

// ══ HELPERS ══
// HTML escape for safe innerHTML insertion
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// Safe ID registry - maps safe DOM IDs to original values
const _reg={};let _regN=0;
function regId(val){ 
  const existing=Object.keys(_reg).find(k=>_reg[k]===val);
  if(existing) return existing;
  const id='r'+(++_regN);_reg[id]=val;return id;
}
function regGet(id){ return _reg[id]||id; }

function eCol(e){
  if(e==='Completada'||e==='Verde') return 'var(--green)';
  if(e==='Retrasada') return 'var(--red)';
  if(e==='Amarillo') return 'var(--amber)';
  if(e==='Según lo programado') return 'var(--green)';
  return 'var(--gray)';
}
function eBadge(e){
  if(e==='Completada'||e==='Verde') return 'b-green';
  if(e==='Retrasada') return 'b-red';
  if(e==='Amarillo') return 'b-amber';
  if(e==='Según lo programado') return 'b-green';
  return 'b-gray';
}
function eBarC(e){
  if(e==='Completada'||e==='Verde') return 'rgba(34,197,94,.75)';
  if(e==='Retrasada') return 'rgba(239,68,68,.75)';
  if(e==='Amarillo') return 'rgba(245,158,11,.75)';
  if(e==='Según lo programado') return 'rgba(34,197,94,.75)';
  if(e==='Tarea futura') return 'rgba(99,102,241,.3)';
  return 'rgba(107,114,128,.4)';
}
function pCls(e,pp,pr){
  if(e==='Tarea futura') return 'pct-gray';
  if(e==='Según lo programado') return 'pct-green';
  if(e==='Completada') return 'pct-green';
  if(e==='Verde') return 'pct-green';
  if(e==='Retrasada') return 'pct-red';
  if(e==='Amarillo') return 'pct-amber';
  if(pr>=pp) return 'pct-green';
  if((pp-pr)>20) return 'pct-red';
  return 'pct-amber';
}
const GCOLS={'Frank Valenzuela':'#6366f1','Gienpierre Francia':'#22c55e','Anthony Bonilla':'#f59e0b','Carlos Vega':'#3b82f6','María Quispe':'#ec4899','Ana Torres':'#06b6d4'};
function gcol(g){ return GCOLS[g]||(GCOLS[g]='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')); }
function gini(g){ return g.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

const FASE_PAL=['#22c55e','#3b82f6','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316'];
function faseColor(name,estado,idx){
  if(estado==='Retrasada') return '#ef4444';
  if(estado==='Tarea futura') return 'rgba(99,102,241,0.3)';
  if(estado==='Amarillo') return '#f59e0b';
  if(estado==='Según lo programado') return '#22c55e';
  if(estado==='Completada') return '#22c55e';
  const n=name.toLowerCase();
  if(n.includes('definici')) return '#22c55e';
  if(n.includes('planific')) return '#3b82f6';
  if(n.includes('ejecuci')||n.includes('desarroll')) return '#f59e0b';
  if(n.includes('prueba')||n.includes('uat')||n.includes('qa')) return '#8b5cf6';
  if(n.includes('despliegue')||n.includes('go live')||n.includes('cierre')||n.includes('soporte')) return '#6366f1';
  return FASE_PAL[idx%FASE_PAL.length];
}

// ══ OVERLAP ALGORITHM ══
function computeRows(fases){
  const rows=[],rowFases=[];
  fases.forEach(f=>{
    const start=f.start_off,end=f.start_off+f.dur;
    let placed=false;
    for(let r=0;r<rows.length;r++){
      if(!rows[r].some(seg=>start<seg.end&&end>seg.start)){
        rows[r].push({start,end});rowFases[r].push(f);placed=true;break;
      }
    }
    if(!placed){rows.push([{start,end}]);rowFases.push([f]);}
  });
  return rowFases;
}

function getProjectMonths(p){
  const pd=s=>{const a=s.split('/');return new Date(parseInt(a[2])+(parseInt(a[2])<100?2000:0),parseInt(a[1])-1,parseInt(a[0]));};
  const start=pd(p.fecha_inicio),end=pd(p.fecha_fin),total=(end-start)/86400000;
  const months=[],cur=new Date(start.getFullYear(),start.getMonth(),1);
  const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Set','Oct','Nov','Dic'];
  while(cur<=end){months.push({label:MN[cur.getMonth()],pct:Math.max(0,(cur-start)/86400000/total*100).toFixed(1)});cur.setMonth(cur.getMonth()+1);}
  return months;
}

// ══ STATE ══
let projects=[],curProj=null,curView='resumen';
let _projCounter=0;
let expPhase={},expRsmPhase={},sbOpen={},filterSt='',filterGestor='';
// expPhase key = projectId+'_'+phaseId to avoid clashes between projects

// ══ SIDEBAR ══
function buildSidebar(){
  document.getElementById('badge-total').textContent=projects.length||'—';
  document.getElementById('sb-date').textContent=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  const byG={};
  projects.forEach(p=>{if(!byG[p.gestor])byG[p.gestor]=[];byG[p.gestor].push(p);});
  Object.keys(byG).forEach(g=>{if(sbOpen[g]===undefined)sbOpen[g]=true;});
  let html='';
  Object.entries(byG).forEach(([g,projs])=>{
    const col=gcol(g),ini=gini(g),isOpen=sbOpen[g];
    const late=projs.filter(p=>p.estado==='Retrasada').length;
    html+=`<div class="sb-gestor">
      <div class="sb-gestor-hdr" data-action="toggle-gestor" data-g="${regId(g)}">
        <div class="sb-av" style="background:${col}20;color:${col}">${ini}</div>
        <span class="sb-gestor-name" style="color:${col}">${esc(g)}</span>
        ${late?`<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(239,68,68,.15);color:var(--red)">${late}▲</span>`:''}
        <span class="sb-gestor-count">${projs.length}</span>
        <span class="sb-chev ${isOpen?'open':''}">›</span>
      </div>
      <div class="sb-projects" style="max-height:${isOpen?projs.length*34+'px':'0'}">
        ${projs.map(p=>`<div class="sb-proj ${curProj&&curProj.id===p.id?'active':''}" data-action="show-project" data-pid="${regId(p.id)}">
          <span class="sb-proj-dot" style="background:${eCol(p.estado)}"></span>
          <span class="sb-proj-name">${p.name}</span>
          <span class="sb-proj-pct" style="color:${eCol(p.estado)}">${p.pct_real}%</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('sb-gestores').innerHTML=html;
  const sheetsOn=Object.keys(SHEET_CONFIG).length>0;
  const cfgEl=document.getElementById('nav-cfg');
  const cfgFooter=document.getElementById('sb-cfg-footer');
  if(cfgEl){cfgEl.style.display=sheetsOn?'none':'flex';cfgEl.className='sb-nav-item'+(curView==='config'?' active':'');}
  if(cfgFooter) cfgFooter.style.display=sheetsOn?'block':'none';
  document.getElementById('nav-all').className='sb-nav-item'+(curView==='portfolio'?' active':'');
  document.getElementById('nav-rsm').className='sb-nav-item'+(curView==='resumen'?' active':'');
}
function toggleGestor(g){sbOpen[g]=!sbOpen[g];buildSidebar();}
function switchView(v){
  curView=v;
  ['portfolio','resumen','detail','config'].forEach(id=>document.getElementById('view-'+id).style.display='none');
  document.getElementById('view-'+v).style.display='';
  buildSidebar();
}

// ══ SYNC BAR ══
function syncBarHTML(){
  const on=Object.keys(SHEET_CONFIG).length>0;
  return on
    ?`<div class="sync-bar"><div class="sync-info">Conectado a <strong style="color:var(--text)">Google Sheets</strong> · ${projects.length} proyectos cargados</div><button class="sync-btn" data-action="sync">↻ Sincronizar</button></div>`
    :`<div class="sync-bar"><div class="sync-info">⚙️ Datos de ejemplo · <span style="color:var(--accent);cursor:pointer;text-decoration:underline" data-action="show-config">Conecta tu Google Sheets →</span></div></div>`;
}

// ══ PORTFOLIO ══
function showPortfolio(){curProj=null;switchView('portfolio');renderPortfolio();}
function renderPortfolio(){
  const total=projects.length;
  if(!total){document.getElementById('view-portfolio').innerHTML=`<div style="padding:48px;text-align:center;color:var(--text3)">Cargando proyectos...</div>`;return;}
  const retrasados=projects.filter(p=>p.estado==='Retrasada').length,
        riesgo=projects.filter(p=>p.estado==='Amarillo').length,
        alDia=projects.filter(p=>p.estado==='Verde'||p.estado==='Completada'||p.estado==='Según lo programado').length,
        avgReal=Math.round(projects.reduce((a,p)=>a+p.pct_real,0)/total);
  const filtered=filterSt?projects.filter(p=>p.estado===filterSt):projects;
  const byG={};filtered.forEach(p=>{if(!byG[p.gestor])byG[p.gestor]=[];byG[p.gestor].push(p);});
  const blocks=Object.entries(byG).map(([gestor,projs])=>{
    const col=gcol(gestor);
    const cards=projs.map(p=>{
      const gap=p.pct_plan-p.pct_real;
      return `<div class="proj-card" data-action="show-project" data-pid="${regId(p.id)}">
        <div class="pc-top">
          <div><div class="pc-name">${esc(p.name)}</div><div class="pc-pm">Gestor: ${esc(p.gestor)}</div></div>
          <div><div class="pc-pct-plan">plan ${p.pct_plan}%</div><div class="pc-pct-real" style="color:${eCol(p.estado)}">${p.pct_real}%</div></div>
        </div>
        <div class="pc-track">
          <div class="pc-bar-plan" style="width:${p.pct_plan}%"></div>
          <div class="pc-bar-real" style="width:${p.pct_real}%;background:${eCol(p.estado)}"></div>
        </div>
        <div class="pc-footer">
          <div class="pc-dates">${p.fecha_inicio} → ${p.fecha_fin}</div>
          <span class="badge ${eBadge(p.estado)}" style="color:${eCol(p.estado)};background:${eCol(p.estado)}18"><span class="bdot" style="background:${eCol(p.estado)}"></span>${p.estado}${gap>0?' −'+gap+'%':''}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="gestor-section">
      <div class="gestor-header">
        <div class="gestor-av-lg" style="background:${col}20;color:${col}">${gini(gestor)}</div>
        <span style="font-size:13px;font-weight:600;color:var(--text2)">${gestor}</span>
        <span style="font-size:11px;color:var(--text3)">${projs.length} proyecto${projs.length>1?'s':''}</span>
      </div>
      <div class="proj-grid">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('view-portfolio').innerHTML=`
    <div class="topbar">
      <div><h2>Portfolio de proyectos</h2><p>${total} proyectos activos · Promedio real: ${avgReal}%</p></div>
      <select onchange="filterSt=this.value;renderPortfolio()">
        <option value="">Todos los estados</option>
        <option value="Retrasada" ${filterSt==='Retrasada'?'selected':''}>Retrasados</option>
        <option value="Amarillo" ${filterSt==='Amarillo'?'selected':''}>En riesgo</option>
        <option value="Verde" ${filterSt==='Verde'?'selected':''}>Al día</option>
        <option value="Según lo programado" ${filterSt==='Según lo programado'?'selected':''}>Según lo programado</option>
      </select>
    </div>
    <div class="metrics">
      <div class="metric m-blue"><div class="metric-lbl">Total activos</div><div class="metric-val">${total}</div><div class="metric-sub">en portfolio</div></div>
      <div class="metric"><div class="metric-lbl">Avance promedio</div><div class="metric-val" style="color:var(--text)">${avgReal}%</div><div class="metric-sub">avance real</div></div>
      <div class="metric m-green"><div class="metric-lbl">Al día</div><div class="metric-val">${alDia}</div><div class="metric-sub">${riesgo} en riesgo</div></div>
      <div class="metric m-red"><div class="metric-lbl">Con atraso</div><div class="metric-val">${retrasados}</div><div class="metric-sub">acción requerida</div></div>
    </div>
    ${syncBarHTML()}${blocks}`;
}

// ══ RESUMEN ══
function showResumen(){
  curProj=null;switchView('resumen');
  if(Object.keys(SHEET_CONFIG).length>0&&document.getElementById('sb-source').textContent==='Cargando...'){
    showSkeletonResumen();loadFromSheets();
  } else { renderResumen(); }
}
function showSkeletonResumen(){
  const n=Object.keys(SHEET_CONFIG).length||4;
  const skeletons=Array(n).fill(0).map((_,i)=>`
    <div class="skeleton-card">
      <div style="display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:16px">
        <div><div class="skeleton" style="height:14px;width:${180+i*20}px;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:140px"></div></div>
        <div style="display:flex;gap:18px">
          <div class="skeleton" style="width:52px;height:40px;border-radius:var(--radius-sm)"></div>
          <div class="skeleton" style="width:52px;height:40px;border-radius:var(--radius-sm)"></div>
          <div class="skeleton" style="width:52px;height:40px;border-radius:var(--radius-sm)"></div>
        </div>
      </div>
      <div class="skeleton" style="height:32px;margin:14px 0 8px"></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <div class="skeleton" style="width:80px;height:10px"></div><div class="skeleton" style="width:80px;height:10px"></div>
      </div>
    </div>`).join('');
  document.getElementById('view-resumen').innerHTML=`
    <div class="topbar"><div><h2>Resumen de proyectos</h2><p>Cargando datos desde Google Sheets...</p></div></div>
    <div class="loading-overlay"><div class="loading-spinner"></div><span>Conectando · cargando ${n} proyecto${n>1?'s':''}...</span></div>
    ${skeletons}`;
}

function renderResumen(){

  if(filterSt) filtered=filtered.filter(p=>p.estado===filterSt);
  if(filterGestor) filtered=filtered.filter(p=>p.gestor===filterGestor);
  const gestores=[...new Set(projects.map(p=>p.gestor))];
  const nConformes=projects.filter(p=>p.estado==='Verde'||p.estado==='Completada'||p.estado==='Según lo programado').length;
  const nAlerta=projects.filter(p=>p.estado==='Amarillo').length;
  const nRetraso=projects.filter(p=>p.estado==='Retrasada').length;
  const cards=filtered.map(p=>buildProjectCard(p)).join('');
  document.getElementById('view-resumen').innerHTML=`

        <span class="filter-label">Estado</span>
        <div class="filter-pills">

          <button class="pill ${filterSt==='Amarillo'?'pill-active pill-amber':''}" data-action="filter-st" data-val="Amarillo"><span class="pill-dot" style="background:var(--amber)"></span>Alerta</button>
          <button class="pill ${filterSt==='Retrasada'?'pill-active pill-red':''}" data-action="filter-st" data-val="Retrasada"><span class="pill-dot" style="background:var(--red)"></span>Retraso</button>

          ${gestores.map(g=>`<button class="pill ${filterGestor===g?'pill-active':''}" data-action="filter-g" data-gv="${regId(g)}"><span style="width:6px;height:6px;border-radius:50%;background:${gcol(g)};display:inline-block;margin-right:3px;vertical-align:1px"></span>${g.split(' ')[0]}</button>`).join('')}

}
function setFilter(type,val){if(type==='st')filterSt=val;else filterGestor=val;renderResumen();}

function buildProjectCard(p){
  // Recalculate estado at display time
  if(p.pct_plan-p.pct_real<=0) p.estado='Según lo programado';
  else if(p.pct_plan-p.pct_real<=3) p.estado='Amarillo';
  else p.estado='Retrasada';
  const col=gcol(p.gestor),gap=p.pct_plan-p.pct_real;
  // Recalc phase estados too
  p.fases.forEach(f=>{
    if(f.pct_real===100){f.estado='Completada';return;}
    if(f.pct_plan===0&&f.pct_real===0){f.estado='Tarea futura';return;}
    const fg=f.pct_plan-f.pct_real;
    if(fg<=0) f.estado='Según lo programado';
    else if(fg<=3) f.estado='Amarillo';
    else f.estado='Retrasada';
  });
  const months=getProjectMonths(p),today=p.today_pct||50;
  // Split: main phases (dur >= 5%) in gantt bar, tail phases (< 5%) as list
  const TAIL_THRESHOLD = 5;
  const mainFases = p.fases.filter(f => f.dur >= TAIL_THRESHOLD);
  const tailFases = p.fases.filter(f => f.dur < TAIL_THRESHOLD);
  const rows=computeRows(mainFases.length ? mainFases : p.fases);
  const totalRowH=rows.length*28+(rows.length-1)*5;
  const rowsHtml=rows.map((rowFases)=>
    `<div class="rsm-gantt-row"><div class="rsm-row-bg"></div>${
      rowFases.map((f,fi)=>{
        const globalFi=p.fases.indexOf(f);
        const fc=faseColor(f.name,f.estado,globalFi);
                const shortName=f.name.split('—')[0].split('·')[0].trim();
        const words=shortName.split(' ');
        const lbl=f.dur>25?shortName:f.dur>12?words.slice(0,2).join(' '):f.dur>5?words[0]:'';
        const progW=f.pct_plan>0?Math.round((f.pct_real/f.pct_plan)*f.dur):0;
        const showSub=f.dur>14&&f.pct_real>0;
        const td=`data-tip-name="${esc(f.id+' · '+f.name)}" data-tip-plan="${f.pct_plan}" data-tip-real="${f.pct_real}" data-tip-estado="${esc(f.estado)}"`;
        return `<div class="rsm-seg" style="left:${f.start_off}%;width:${f.dur}%;background:${fc}" ${td} onmouseenter="showTip(event,this)" onmouseleave="hideTip()">
          <div class="rsm-seg-inner">
            ${lbl?`<span class="rsm-seg-name">${esc(lbl)}</span>`:''}
            ${showSub?`<span class="rsm-seg-sub">${f.pct_real}%</span>`:''}
          </div>
          <div class="rsm-seg-prog" style="width:${progW}%"></div>
        </div>`;
      }).join('')
    }</div>`
  ).join('');
  const overlapNote=mainFases.length!==p.fases.length||rows.length>1?`<span style="font-size:9px;background:rgba(99,102,241,.15);color:var(--accent);padding:1px 6px;border-radius:10px;margin-left:6px">${rows.length} filas por solapamiento</span>`:'';
  const monthAxis=months.map(m=>`<div class="rsm-month-cell">${m.label}</div>`).join('');
  const isOpen=expRsmPhase[p.id+'_open'];

  // Phase rows with task expand
  const phaseRowsHtml=isOpen?p.fases.map((f,fi)=>{
    const fc=faseColor(f.name,f.estado,fi);
    const rw=f.pct_plan>0?Math.round((f.pct_real/f.pct_plan)*f.dur):0;
    const phKey=p.id+'_'+f.id;
    const phOpen=expRsmPhase[phKey];
    const taskRowsHtml=phOpen&&f.tasks.length?`<div class="rsm-task-rows">${
      f.tasks.map(t=>{
        const g2=t.pct_plan-t.pct_real;
        const isLate=t.estado==='Retrasada';
        return `<div class="rsm-task-row">
          <div class="rsm-task-name-cell">
            <span class="rsm-task-edt">${t.edt}</span>
            <span class="rsm-task-name ${isLate?'late':''}">${esc(t.name)}</span>
            ${t.atraso?`<span class="rsm-task-chip">${t.atraso}</span>`:''}
          </div>
          <div class="rsm-pct">${t.pct_plan}%</div>
          <div class="rsm-pct" style="color:${eCol(t.estado)}">${t.pct_real}%</div>
          <div><span class="badge ${eBadge(t.estado)}" style="font-size:9px">${t.estado}</span></div>
          <div class="rsm-mini-wrap"><div class="rsm-mini-bg">
            <div class="rsm-mini-plan" style="left:${f.start_off}%;width:${f.dur}%;background:${fc}"></div>
            <div class="rsm-mini-real" style="left:${f.start_off}%;width:${rw}%;background:${fc}"></div>
            <div class="rsm-mini-today" style="left:${today}%"></div>
          </div></div>
          <div class="rsm-phase-dates">${t.start||'—'}<br>${t.end||'—'}</div>
        </div>`;
      }).join('')
    }</div>`:'';
    return `<div>
      <div class="rsm-phase-row ${phOpen?'expanded':''}" data-action="toggle-phase" data-pid="${regId(p.id)}" data-fid="${regId(f.id)}">
        <div class="rsm-phase-name-cell">
          <div class="rsm-ph-chev ${phOpen?'open':''}">›</div>
          <div class="rsm-phase-dot" style="background:${fc}"></div>
          <span class="rsm-phase-edt">${f.id}</span>
          <span class="rsm-phase-name">${esc(f.name)}</span>
          ${f.tasks.length?`<span style="font-size:9px;color:var(--text3);margin-left:4px">(${f.tasks.length})</span>`:''}
        </div>
        <div class="rsm-pct">${f.pct_plan}%</div>
        <div class="rsm-pct" style="color:${eCol(f.estado)}">${f.pct_real}%</div>
        <div><span class="badge ${eBadge(f.estado)}" style="font-size:9px">${f.estado}</span></div>
        <div class="rsm-mini-wrap"><div class="rsm-mini-bg">
          <div class="rsm-mini-plan" style="left:${f.start_off}%;width:${f.dur}%;background:${fc}"></div>
          <div class="rsm-mini-real" style="left:${f.start_off}%;width:${rw}%;background:${fc}"></div>
          <div class="rsm-mini-today" style="left:${today}%"></div>
        </div></div>
        <div class="rsm-phase-dates">${p.fecha_inicio.slice(0,5)}<br>${p.fecha_fin}</div>
      </div>
      ${taskRowsHtml}
    </div>`;
  }).join(''):'';

  return `<div class="rsm-card" id="card-${p.id}">
    <div class="rsm-top" data-action="toggle-card" data-pid="${regId(p.id)}">
      <div>
        <div class="rsm-proj-name">
          <div class="rsm-chev ${isOpen?'open':''}">›</div>
          ${esc(p.name)}
          <span class="badge ${eBadge(p.estado)}" style="font-size:10px;color:${eCol(p.estado)};background:${eCol(p.estado)}18;border:1px solid ${eCol(p.estado)}20"><span class="bdot" style="background:${eCol(p.estado)}"></span>${p.estado}</span>
        </div>
        <div class="rsm-meta">
          <div class="rsm-av" style="background:${col}20;color:${col}">${gini(p.gestor)}</div>
          <span style="color:${col};font-weight:500">${esc(p.gestor)}</span>
          <span style="color:var(--border2)">·</span>
          <span>${p.fecha_inicio} → ${p.fecha_fin}</span>
        </div>
      </div>
      <div class="rsm-stats">
        <div class="rsm-stat"><div class="rsm-stat-lbl">Esperado</div><div class="rsm-stat-val" style="color:var(--text2)">${p.pct_plan}%</div></div>
        <div class="rsm-divider"></div>
        <div class="rsm-stat"><div class="rsm-stat-lbl">Real</div><div class="rsm-stat-val" style="color:${eCol(p.estado)}">${p.pct_real}%</div></div>
        <div class="rsm-divider"></div>
        <div class="rsm-stat"><div class="rsm-stat-lbl">Brecha</div><div class="rsm-stat-val" style="color:${gap>0?'var(--red)':gap<0?'var(--green)':'var(--text2)'}">${gap>0?'−':gap<0?'+':''}${Math.abs(gap)}%</div></div>
      </div>
    </div>
    <div class="rsm-roadmap">
      <div class="rsm-gantt-outer">
        <div class="rsm-gantt-inner">
          <div class="rsm-month-axis">${monthAxis}</div>
          <div class="rsm-gantt-rows" style="margin-bottom:8px">
            ${rowsHtml}
            <div class="rsm-today" style="left:${today}%;height:${totalRowH+16}px"></div>
          </div>
        </div>
      </div>
      <div class="rsm-date-range">
        <span>${p.fecha_inicio}</span>
        <span>${p.fases.length} fases${overlapNote}</span>
        <span>${p.fecha_fin}</span>
      </div>
      ${tailFases.length ? '<div class="rsm-tail"><div class="rsm-tail-lbl">Fases de cierre</div>'+tailFases.map(f=>{const fc=faseColor(f.name,f.estado,p.fases.indexOf(f));return '<div class="rsm-tail-item"><div class="rsm-tail-dot" style="background:'+fc+'"></div><span class="rsm-tail-name">'+esc(f.id)+' · '+esc(f.name)+'</span><span class="rsm-tail-pct" style="color:'+eCol(f.estado)+'">'+f.pct_real+'%</span><span class="rsm-tail-badge '+eBadge(f.estado)+'">'+f.estado+'</span></div>';}).join('')+'</div>' : ''}
    </div>
    ${isOpen?`<div class="rsm-phases">
      <div class="rsm-phases-hdr">
        <span style="padding-left:4px">Fase</span>
        <span style="text-align:right;padding-right:14px">Esp.</span>
        <span style="text-align:right;padding-right:14px">Real</span>
        <span>Estado</span>
        <span style="padding-left:4px">Gantt</span>
        <span style="text-align:right">Fechas</span>
      </div>
      ${phaseRowsHtml}
    </div>`:''}
  </div>`;
}

function toggleRsmCard(pid){
  expRsmPhase[pid+'_open']=!expRsmPhase[pid+'_open'];
  rerenderCard(pid);
}
function toggleRsmPhase(pid,fid){
  const key=pid+'_'+fid;
  expRsmPhase[key]=!expRsmPhase[key];
  rerenderCard(pid);
}
function rerenderCard(pid){
  // Re-render the full resumen view - simpler and more reliable
  // We need to preserve scroll position
  const container = document.getElementById('rsm-cards');
  if(!container) { renderResumen(); return; }
  const scrollY = window.scrollY;
  // Rebuild only the cards container content
  let filtered = projects;
  if(filterSt) filtered = filtered.filter(p=>p.estado===filterSt);
  if(filterGestor) filtered = filtered.filter(p=>p.gestor===filterGestor);
  container.innerHTML = filtered.map(p=>buildProjectCard(p)).join('');
  // Restore scroll
  window.scrollTo(0, scrollY);
}

// ══ CSV FETCH & PARSE ══
function isValidCSV(text){
  if(!text||text.length<50) return false;
  if(text.trim().startsWith('<')) return false;
  const firstLine=text.split('\n')[0].toLowerCase();
  return firstLine.includes('edt')||firstLine.includes('nombre');
}
async function fetchCSV(url){
  if(GAS_PROXY_URL){
    try{
      const r=await fetch(GAS_PROXY_URL+'?url='+encodeURIComponent(url));
      if(r.ok){const t=await r.text();if(isValidCSV(t))return t;}
    }catch(e){}
  }
  try{const r=await fetch(url);if(r.ok){const t=await r.text();if(isValidCSV(t))return t;}}catch(e){}
  return null;
}
async function loadFromSheets(){
  _projCounter=0; // reset global counter
  const entries=Object.entries(SHEET_CONFIG);if(!entries.length)return;
  const all=[];
  for(const [name,url] of entries){
    try{
      const csv=await fetchCSV(url);
      if(csv){
        const parsed=parseCSV(csv);
        if(parsed.length){all.push(...parsed);console.log('✓',name,'→',parsed.length,'proyectos');}
        else console.warn('✗ Sin proyectos:',name);
      } else console.warn('✗ Sin CSV:',name);
    }catch(e){console.warn('✗ Error:',name,e.message);}
  }
  console.log('Total cargados:',all.length,'proyectos');
  if(all.length){
    projects=all;
    document.getElementById('sb-source').textContent='Google Sheets conectado';
    document.getElementById('sb-date').textContent=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  } else {
    document.getElementById('sb-source').textContent='Error al conectar';
  }
  buildSidebar();
  if(window._pmo) window._pmo.projects=projects;
  if(curView==='resumen') renderResumen();
  else if(curView==='portfolio') renderPortfolio();
}

function parseCSV(csv){
  const lines=csv.trim().split(/\r?\n/);
  const sep=lines[0].includes('\t')?'\t':',';
  function splitRow(row){
    if(sep==='\t') return row.split('\t');
    const result=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){result.push(cur);cur='';}
      else cur+=c;
    }
    result.push(cur);return result;
  }
  const headers=splitRow(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
  const col=name=>headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const iEDT=col('EDT'),iNombre=col('Nombre'),iPlan=col('esperado'),iReal=col('completado'),
        iEstado=col('Estado'),iStart=col('Comienzo'),iEnd=col('Fin'),iRes=col('recursos'),
        iVar=col('Var'),iRisk=col('Riesgos');
  const pct=v=>parseInt((v||'0').replace(/[^0-9\-]/g,'').trim())||0;
  const clean=v=>(v||'').trim().replace(/^"|"$/g,'');
  function dateToOffset(dateStr,projStart,projEnd){
    if(!dateStr||!projStart||!projEnd) return 0;
    const pd=s=>{const a=s.trim().split('/');if(a.length<3)return null;return new Date(parseInt(a[2])+(parseInt(a[2])<100?2000:0),parseInt(a[1])-1,parseInt(a[0]));};
    const d=pd(dateStr),s=pd(projStart),e=pd(projEnd);
    if(!d||!s||!e) return 0;
    const total=(e-s)/86400000;if(total<=0)return 0;
    return Math.max(0,Math.min(100,((d-s)/86400000/total*100)));
  }
  let project=null,currentFase=null;const projs=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols=splitRow(lines[i]);if(cols.length<3) continue;
    const edt=clean(cols[iEDT]),nombre=clean(cols[iNombre]);if(!edt||!nombre) continue;
    const isRoot=/^\d+$/.test(edt);
    const isPhase=/^\d+\.\d+$/.test(edt);
    if(isRoot){
      const gestor=iRes>=0?clean(cols[iRes]).split(';')[0].trim().replace(/\.$/,''):'Sin gestor';
      const fi=clean(cols[iStart]),fe=clean(cols[iEnd]);
      project={
        id:'p'+(++_projCounter),
        name:nombre,gestor,
        pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),
        estado:clean(cols[iEstado]),
        fecha_inicio:fi,fecha_fin:fe,
        today_pct:50,fases:[]
      };
      projs.push(project);currentFase=null;
    } else if(project){
      if(isPhase){
        const fi=clean(cols[iStart]),fe=clean(cols[iEnd]);
        const startOff=dateToOffset(fi,project.fecha_inicio,project.fecha_fin);
        const endOff=dateToOffset(fe,project.fecha_inicio,project.fecha_fin);
        const dur=Math.max(3,endOff-startOff);
        currentFase={id:edt,name:nombre,estado:clean(cols[iEstado]),
          pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),
          start_off:startOff,dur,tasks:[]};
        project.fases.push(currentFase);
      } else if(currentFase){
        const isLate=clean(cols[iEstado])==='Retrasada';
        const g=pct(cols[iPlan])-pct(cols[iReal]);
        const varDur=iVar>=0?clean(cols[iVar]):'';
        currentFase.tasks.push({
          edt,name:nombre,estado:clean(cols[iEstado]),
          pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),
          start:clean(cols[iStart]),end:clean(cols[iEnd]),
          atraso:isLate&&g>0?`-${g}%`:(isLate&&varDur&&varDur!=='0 días'?varDur:''),
          riesgo:iRisk>=0?clean(cols[iRisk]):''
        });
      }
    }
  }
  // Calculate today_pct per project
  projs.forEach(p=>{
    const pd=s=>{if(!s)return null;const a=s.split('/');if(a.length<3)return null;return new Date(parseInt(a[2])+(parseInt(a[2])<100?2000:0),parseInt(a[1])-1,parseInt(a[0]));};
    const start=pd(p.fecha_inicio),end=pd(p.fecha_fin),today=new Date();
    if(start&&end&&today>=start){
      const total=(end-start)/86400000;
      p.today_pct=Math.max(2,Math.min(97,((today-start)/86400000/total*100)));
    }
    // Recalculate estado based on real gap (overrides MS Project value)
    const gap=p.pct_plan-p.pct_real;
    if(gap<=0)       p.estado='Según lo programado'; // on time or ahead
    else if(gap<=3)  p.estado='Amarillo';             // 1-3% warning
    else             p.estado='Retrasada';             // 4%+ critical

    // Also recalculate estado for each phase
    p.fases.forEach(f=>{
      if(f.estado==='Tarea futura') return; // keep future tasks as-is
      if(f.estado==='Completada'&&f.pct_real===100) return; // keep completed
      const fg=f.pct_plan-f.pct_real;
      if(fg<=0)      f.estado='Según lo programado';
      else if(fg<=3) f.estado='Amarillo';
      else           f.estado='Retrasada';
    });
  });
  return projs;
}

// ══ TOOLTIP ══
function showTip(e, el){
  const tip = document.getElementById('rsm-tooltip');
  if(!tip) return;
  const name   = el.dataset.tipName   || '';
  const plan   = el.dataset.tipPlan   || '0';
  const real   = el.dataset.tipReal   || '0';
  const estado = el.dataset.tipEstado || '';
  const gap    = parseInt(plan) - parseInt(real);
  const gapColor = gap<=0?'var(--green)':gap<=3?'var(--amber)':'var(--red)';
  const stColor  = gap<=0?'var(--green)':gap<=3?'var(--amber)':'var(--red)';
  tip.innerHTML = `
    <div class="rsm-tooltip-name">${name}</div>
    <div class="rsm-tooltip-row">
      <span class="rsm-tooltip-lbl">Estado</span>
      <span class="rsm-tooltip-val" style="color:${stColor}">${estado}</span>
    </div>
    <div class="rsm-tooltip-row">
      <span class="rsm-tooltip-lbl">Esperado</span>
      <span class="rsm-tooltip-val">${plan}%</span>
    </div>
    <div class="rsm-tooltip-row">
      <span class="rsm-tooltip-lbl">Real</span>
      <span class="rsm-tooltip-val" style="color:${real>=plan?'var(--green)':'var(--red)'}">${real}%</span>
    </div>
    <div class="rsm-tooltip-row">
      <span class="rsm-tooltip-lbl">Brecha</span>
      <span class="rsm-tooltip-val" style="color:${gapColor}">${gap>0?'−':''}${Math.abs(gap)}%</span>
    </div>`;
  tip.classList.add('visible');
  positionTip(e);
}
function positionTip(e){
  const tip = document.getElementById('rsm-tooltip');
  if(!tip||!tip.classList.contains('visible')) return;
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const tw = tip.offsetWidth || 220;
  const th = tip.offsetHeight || 120;
  tip.style.left = (x + tw > window.innerWidth ? x - tw - 28 : x) + 'px';
  tip.style.top  = (y + th > window.innerHeight ? y - th : y) + 'px';
}
function hideTip(){
  const tip = document.getElementById('rsm-tooltip');
  if(tip) tip.classList.remove('visible');
}
document.addEventListener('mousemove', function(e){
  if(document.getElementById('rsm-tooltip')?.classList.contains('visible')) positionTip(e);
});

// Single event delegation listener - handles ALL clicks
document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  e.stopPropagation();
  const action = el.dataset.action;
  const pid    = el.dataset.pid ? regGet(el.dataset.pid) : null;
  const fid    = el.dataset.fid ? regGet(el.dataset.fid) : null;
  const gid    = el.dataset.g   ? regGet(el.dataset.g)   : null;
  const gvid   = el.dataset.gv !== undefined ? (el.dataset.gv ? regGet(el.dataset.gv) : '') : null;
  const val    = el.dataset.val !== undefined ? el.dataset.val : null;

  switch(action){
    case 'show-project':       showProjectById(pid); break;
    case 'toggle-card':        toggleRsmCard(pid); break;
    case 'toggle-phase':       toggleRsmPhase(pid, fid); break;
    case 'toggle-phase-detail':togglePhaseDetail(pid, fid); break;
    case 'toggle-gestor':      toggleGestor(gid); break;
    case 'show-portfolio':     showPortfolio(); break;
    case 'show-resumen':       showResumen(); break;
    case 'show-config':        showConfig(); break;
    case 'sync':               loadFromSheets(); break;
    case 'filter-st':          setFilter('st', val); break;
    case 'filter-g':           setFilter('g', gvid); break;
  }
});

buildSidebar();
showResumen();
loadFromSheets();
