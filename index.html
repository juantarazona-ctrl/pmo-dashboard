<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio de Proyectos — PMO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161922;--bg3:#1e2230;--bg4:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#9095a8;--text3:#5a5f72;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --blue:#3b82f6;--purple:#8b5cf6;--gray:#6b7280;--accent:#6366f1;
  --radius:12px;--radius-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo-eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.sb-logo-title{font-size:15px;font-weight:600;color:var(--text)}
.sb-nav{padding:8px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:12px;transition:all .13s;margin-bottom:1px}
.sb-nav-item:hover{background:var(--bg3);color:var(--text)}
.sb-nav-item.active{background:rgba(99,102,241,.14);color:var(--accent);font-weight:500}
.sb-section{padding:16px 18px 6px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.sb-gestor{margin:1px 8px;border-radius:var(--radius-sm);overflow:hidden}
.sb-gestor-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .13s;user-select:none}
.sb-gestor-hdr:hover{background:var(--bg3)}
.sb-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sb-gestor-name{flex:1;font-size:12px;font-weight:600}
.sb-gestor-count{font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3)}
.sb-chev{font-size:11px;color:var(--text3);transition:transform .2s}
.sb-chev.open{transform:rotate(90deg)}
.sb-projects{overflow:hidden;transition:max-height .25s ease}
.sb-proj{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 22px;cursor:pointer;border-radius:var(--radius-sm);margin:1px 0;transition:background .13s}
.sb-proj:hover{background:var(--bg3)}
.sb-proj.active{background:rgba(99,102,241,.1)}
.sb-proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-proj-name{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-proj.active .sb-proj-name{color:var(--accent)}
.sb-proj-pct{font-size:10px;font-family:'DM Mono',monospace;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:8px 16px}
.sb-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.sb-footer-text{font-size:10px;color:var(--text3);line-height:1.7}

/* ── MAIN ── */
.main{overflow-y:auto;padding:28px 36px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.topbar h2{font-size:22px;font-weight:600}
.topbar p{font-size:13px;color:var(--text2);margin-top:3px}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.metric-val{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.m-red .metric-val{color:var(--red)}
.m-green .metric-val{color:var(--green)}
.m-blue .metric-val{color:var(--blue)}

/* ── SYNC BAR ── */
.sync-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.sync-info{font-size:12px;color:var(--text2)}
.sync-btn{font-size:11px;padding:6px 12px;background:rgba(99,102,241,.12);color:var(--accent);border:1px solid rgba(99,102,241,.25);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .13s}
.sync-btn:hover{background:rgba(99,102,241,.22)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-green{background:rgba(34,197,94,.12);color:var(--green)}
.b-red{background:rgba(239,68,68,.12);color:var(--red)}
.b-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.b-gray{background:rgba(107,114,128,.12);color:var(--gray)}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── PORTFOLIO ── */
.gestor-section{margin-bottom:32px}
.gestor-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.gestor-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .15s}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pc-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.pc-pm{font-size:11px;color:var(--text3)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pc-pct-plan{font-size:10px;color:var(--text3);text-align:right;margin-bottom:2px}
.pc-pct-real{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;text-align:right;line-height:1}
.pc-track{height:4px;background:var(--bg4);border-radius:2px;margin:12px 0;position:relative}
.pc-bar-plan{position:absolute;top:0;left:0;height:4px;border-radius:2px;background:rgba(99,102,241,.3)}
.pc-bar-real{position:absolute;top:0;left:0;height:4px;border-radius:2px}
.pc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.pc-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* ══════════════════════════════════════════
   RESUMEN CARD
══════════════════════════════════════════ */
.rsm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;transition:border-color .15s}
.rsm-card:hover{border-color:var(--border2)}

.rsm-top{display:grid;grid-template-columns:1fr auto;gap:24px;padding:20px 24px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.rsm-top:hover{background:rgba(255,255,255,.015)}
.rsm-proj-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rsm-chev{width:18px;height:18px;border-radius:4px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rsm-chev.open{transform:rotate(90deg)}
.rsm-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.rsm-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rsm-stats{display:flex;align-items:center;gap:18px;flex-shrink:0}
.rsm-stat{text-align:center;min-width:50px}
.rsm-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.rsm-stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.rsm-divider{width:0.5px;height:40px;background:var(--border2)}

/* roadmap section */
.rsm-roadmap{padding:14px 24px 18px}
.rsm-month-axis{display:flex;border-bottom:1px solid var(--border);margin-bottom:10px;padding-bottom:4px}
.rsm-month-cell{flex:1;font-size:9px;font-weight:500;color:var(--text3);position:relative}
.rsm-month-cell::before{content:'';position:absolute;left:0;top:-3px;bottom:0;width:0.5px;background:var(--border)}

/* multi-row gantt */
.rsm-gantt-rows{position:relative;display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.rsm-gantt-row{position:relative;height:28px}
.rsm-row-bg{position:absolute;top:0;left:0;right:0;height:100%;background:var(--bg4);border-radius:4px}

.rsm-seg{
  position:absolute;top:2px;height:24px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:default;transition:filter .15s;
}
.rsm-seg:hover{filter:brightness(1.15)}
.rsm-seg-lbl{font-size:9px;font-weight:500;color:rgba(255,255,255,.9);white-space:nowrap;padding:0 6px;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
.rsm-seg-prog{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.3);border-radius:0 0 2px 2px}

.rsm-today{position:absolute;top:-6px;width:2px;background:var(--accent);opacity:.85;border-radius:1px;z-index:5;pointer-events:none}
.rsm-today::before{content:'Hoy';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:500;color:var(--accent);white-space:nowrap;font-family:'DM Sans',sans-serif}
.rsm-today::after{content:'▼';position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--accent)}

.rsm-date-range{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:6px}

/* expanded phases */
.rsm-phases{border-top:1px solid var(--border);background:var(--bg3)}
.rsm-phases-hdr{display:grid;grid-template-columns:1fr 58px 58px 112px 190px 82px;padding:7px 24px;border-bottom:1px solid var(--border)}
.rsm-phases-hdr span{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.rsm-phase-row{display:grid;grid-template-columns:1fr 58px 58px 112px 190px 82px;padding:10px 24px;border-bottom:0.5px solid rgba(255,255,255,.04);align-items:center;transition:background .1s}
.rsm-phase-row:last-child{border-bottom:none}
.rsm-phase-row:hover{background:rgba(255,255,255,.02)}
.rsm-phase-name-cell{display:flex;align-items:center;gap:8px}
.rsm-phase-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.rsm-phase-edt{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.rsm-phase-name{font-size:12px;color:var(--text2);font-weight:500}
.rsm-pct{font-family:'DM Mono',monospace;font-size:12px;text-align:right;padding-right:14px;color:var(--text3)}
.rsm-mini-wrap{position:relative;height:18px}
.rsm-mini-bg{position:absolute;top:3px;left:0;right:0;height:12px;background:var(--bg4);border-radius:3px;overflow:hidden;border:0.5px solid var(--border)}
.rsm-mini-plan{position:absolute;top:0;height:5px;border-radius:1px;opacity:.4}
.rsm-mini-real{position:absolute;bottom:0;height:5px;border-radius:1px}
.rsm-mini-today{position:absolute;top:0;bottom:0;width:1px;background:var(--accent);opacity:.7}
.rsm-phase-dates{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right;line-height:1.5}

/* ── DETAIL ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);transition:all .13s}
.back-btn:hover{color:var(--text);background:var(--bg3)}
.detail-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:20px}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.dh-name{font-size:21px;font-weight:600}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:8px}
.dh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dh-stat{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 16px}
.dh-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.dh-stat-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace}
.alert-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px}
.alert-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.alert-item{font-size:12px;color:#fca5a5;padding:3px 0 3px 10px;position:relative}
.alert-item::before{content:'·';position:absolute;left:0;color:var(--red)}
.section-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.gantt-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.gantt-thead{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.gantt-thead span{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.phase-block{border-bottom:1px solid var(--border)}
.phase-block:last-child{border-bottom:none}
.phase-hdr{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:10px 14px;cursor:pointer;align-items:center;transition:background .12s}
.phase-hdr:hover{background:rgba(255,255,255,.025)}
.ph-name-cell{display:flex;align-items:center;gap:7px}
.ph-chev{width:16px;height:16px;background:var(--bg4);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);flex-shrink:0;transition:transform .18s}
.ph-chev.open{transform:rotate(90deg)}
.ph-name{font-size:12px;font-weight:500;color:var(--text)}
.pct-cell{font-family:'DM Mono',monospace;font-size:11px;text-align:right;padding-right:14px}
.pct-muted{color:var(--text3)}.pct-green{color:var(--green)}.pct-amber{color:var(--amber)}.pct-red{color:var(--red)}.pct-gray{color:var(--text3)}
.st-cell{display:flex;justify-content:flex-end;padding-right:6px}
.g-track{height:18px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.g-plan{position:absolute;height:8px;top:1px;border-radius:2px;background:rgba(99,102,241,.35)}
.g-real{position:absolute;height:8px;bottom:1px;border-radius:2px}
.g-today-l{position:absolute;width:1px;top:0;bottom:0;background:var(--accent);opacity:.7}
.task-rows{border-top:1px solid rgba(255,255,255,.04)}
.task-row{display:grid;grid-template-columns:240px 68px 68px 100px 1fr 88px;padding:6px 14px 6px 36px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(255,255,255,.02)}
.task-name-cell{display:flex;align-items:center;gap:6px;overflow:hidden}
.task-edt{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0;min-width:52px}
.task-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-name.late{color:#fca5a5}
.task-chip{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(239,68,68,.15);color:var(--red);flex-shrink:0;margin-left:3px;white-space:nowrap}

/* config */
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.config-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.code-block{background:var(--bg3);border-radius:var(--radius-sm);padding:14px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);line-height:2;overflow-x:auto}
.step-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.step-num{width:20px;height:20px;border-radius:50%;background:rgba(99,102,241,.15);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}


/* ── FILTER BAR ── */
.filter-bar{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 18px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.filter-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);white-space:nowrap}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:500;
  background:var(--bg3);color:var(--text2);
  border:1px solid var(--border);
  cursor:pointer;transition:all .13s;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.pill:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.pill-active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.pill-green.pill-active{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.3)}
.pill-amber.pill-active{background:rgba(245,158,11,.15);color:var(--amber);border-color:rgba(245,158,11,.3)}
.pill-red.pill-active{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.3)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.filter-sep{width:1px;height:32px;background:var(--border2);flex-shrink:0}
.filter-stats{display:flex;gap:12px;margin-left:auto}
.fstat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border-radius:var(--radius-sm);min-width:56px}
.fstat span:first-child{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.fstat span:last-child{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.fstat-green{background:rgba(34,197,94,.08);color:var(--green)}
.fstat-amber{background:rgba(245,158,11,.08);color:var(--amber)}
.fstat-red{background:rgba(239,68,68,.08);color:var(--red)}


/* ── SKELETON LOADING ── */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.skeleton-line{height:14px;margin-bottom:10px}
.skeleton-bar{height:32px;margin:14px 0 8px}
.loading-overlay{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3);padding:8px 0;margin-bottom:12px}
.loading-spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
select{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="shell">

<!-- ════════ SIDEBAR ════════ -->
<aside class="sidebar">

const FASE_PAL = ['#22c55e','#3b82f6','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316'];
function faseColor(name, estado, idx) {
  if(estado==='Retrasada') return '#ef4444';
  if(estado==='Tarea futura') return 'rgba(99,102,241,0.3)';
  if(estado==='Amarillo') return '#f59e0b';
  const n = name.toLowerCase();
  if(n.includes('definici')) return '#22c55e';
  if(n.includes('planific')) return '#3b82f6';
  if(n.includes('ejecuci')||n.includes('desarroll')) return '#f59e0b';
  if(n.includes('prueba')||n.includes('uat')||n.includes('qa')) return '#8b5cf6';
  if(n.includes('despliegue')||n.includes('go live')||n.includes('cierre')) return '#6366f1';
  return FASE_PAL[idx % FASE_PAL.length];
}

// ══ OVERLAP LAYOUT ALGORITHM ══
// Places phases into rows so overlapping ones never share a row.
// Returns array of row arrays: [[fase, fase], [fase], ...]
function computeRows(fases) {
  const rows = []; // each row: array of {start_off, end_off}
  const rowFases = []; // parallel: array of fase arrays
  fases.forEach((f, fi) => {
    const start = f.start_off;
    const end   = f.start_off + f.dur;
    let placed  = false;
    for(let r = 0; r < rows.length; r++) {
      const overlaps = rows[r].some(seg => start < seg.end && end > seg.start);
      if(!overlaps) {
        rows[r].push({start, end, fi});
        rowFases[r].push(f);
        placed = true;
        break;
      }
    }
    if(!placed) {
      rows.push([{start, end, fi}]);
      rowFases.push([f]);
    }
  });
  return rowFases;
}

function getProjectMonths(p){
  const pd=s=>{const a=s.split('/');return new Date(parseInt(a[2])+(parseInt(a[2])<100?2000:0),parseInt(a[1])-1,parseInt(a[0]));};
  const start=pd(p.fecha_inicio),end=pd(p.fecha_fin),total=(end-start)/86400000;
  const months=[],cur=new Date(start.getFullYear(),start.getMonth(),1);
  const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Set','Oct','Nov','Dic'];
  while(cur<=end){months.push({label:MN[cur.getMonth()],pct:Math.max(0,(cur-start)/86400000/total*100).toFixed(1)});cur.setMonth(cur.getMonth()+1);}
  return months;
}

  Object.entries(byG).forEach(([g,projs])=>{

    const late=projs.filter(p=>p.estado==='Retrasada').length;

        ${projs.map(p=>`<div class="sb-proj ${curProj&&curProj.id===p.id?'active':''}" onclick="showProject('${p.id}')">

          <span class="sb-proj-pct" style="color:${eCol(p.estado)}">${p.pct_real}%</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('sb-gestores').innerHTML=html;
  document.getElementById('nav-all').className='sb-nav-item'+(curView==='portfolio'?' active':'');
  document.getElementById('nav-rsm').className='sb-nav-item'+(curView==='resumen'?' active':'');
  // Show/hide config based on Sheets connection
  const sheetsConnected=Object.keys(SHEET_CONFIG).length>0;
  const cfgEl=document.getElementById('nav-cfg');
  const cfgFooter=document.getElementById('sb-cfg-footer');
  if(cfgEl){
    cfgEl.style.display=sheetsConnected?'none':'flex';
    cfgEl.className='sb-nav-item'+(curView==='config'?' active':'');
  }
  // When connected, show tiny gear in footer instead
  if(cfgFooter) cfgFooter.style.display=sheetsConnected?'block':'none';
}

function buildRoadmapRows(p){
  const today=p.today_pct||50;
  const rows=computeRows(p.fases);
  const totalRowHeight=rows.length*28+(rows.length-1)*5;

  const rowsHtml=rows.map((rowFases,ri)=>{
    const segs=rowFases.map((f,fi)=>{
      const globalFi=p.fases.indexOf(f);
      const fc=faseColor(f.name,f.estado,globalFi);
      const shortName=f.name.split('—')[0].trim().split(' ').slice(0,2).join(' ');
      const progW=f.pct_plan>0?Math.round((f.pct_real/f.pct_plan)*f.dur):0;
      const showPct=f.dur>10;
      return `<div class="rsm-seg" style="left:${f.start_off}%;width:${f.dur}%;background:${fc}" title="${f.id} · ${f.name} — ${f.pct_real}% real · ${f.estado}">
        <span class="rsm-seg-lbl">${f.id} ${shortName}${showPct?` · ${f.pct_real}%`:''}</span>
        <div class="rsm-seg-prog" style="width:${progW}%"></div>
      </div>`;
    }).join('');
    return `<div class="rsm-gantt-row"><div class="rsm-row-bg"></div>${segs}</div>`;
  }).join('');

  const rowCount=rows.length>1?`<span style="font-size:9px;background:rgba(99,102,241,.15);color:var(--accent);padding:1px 6px;border-radius:10px;margin-left:6px">${rows.length} filas por solapamiento</span>`:'';

  return `<div class="rsm-gantt-rows" id="gr-${p.id}">${rowsHtml}<div class="rsm-today" id="td-${p.id}" style="left:${today}%;height:${totalRowHeight+16}px"></div></div>
    <div class="rsm-date-range">
      <span>${p.fecha_inicio}</span>
      <span style="display:flex;align-items:center">${p.fases.length} fases${rowCount}</span>
      <span>${p.fecha_fin}</span>
    </div>`;
}

function buildProjectCard(p){
  const col=gcol(p.gestor),isOpen=expRsm[p.id],gap=p.pct_plan-p.pct_real;
  const months=getProjectMonths(p);
  const monthAxis=months.map(m=>`<div class="rsm-month-cell">${m.label}</div>`).join('');
  const today=p.today_pct||50;

  const phaseRows=isOpen?p.fases.map((f,i)=>{
    const fc=faseColor(f.name,f.estado,i);
    const rw=f.pct_plan>0?Math.round((f.pct_real/f.pct_plan)*f.dur):0;
    return `<div class="rsm-phase-row">
      <div class="rsm-phase-name-cell">
        <div class="rsm-phase-dot" style="background:${fc}"></div>
        <span class="rsm-phase-edt">${f.id}</span>
        <span class="rsm-phase-name">${f.name}</span>
      </div>
      <div class="rsm-pct">${f.pct_plan}%</div>
      <div class="rsm-pct" style="color:${eCol(f.estado)}">${f.pct_real}%</div>
      <div><span class="badge ${eBadge(f.estado)}" style="font-size:9px">${f.estado}</span></div>
      <div class="rsm-mini-wrap"><div class="rsm-mini-bg">
        <div class="rsm-mini-plan" style="left:${f.start_off}%;width:${f.dur}%;background:${fc}"></div>
        <div class="rsm-mini-real" style="left:${f.start_off}%;width:${rw}%;background:${fc}"></div>
        <div class="rsm-mini-today" style="left:${today}%"></div>
      </div></div>
      <div class="rsm-phase-dates">${p.fecha_inicio.slice(0,5)}<br>${p.fecha_fin}</div>
    </div>`;
  }).join(''):'' ;

  return `<div class="rsm-card" id="card-${p.id}">
    <div class="rsm-top" onclick="toggleRsm('${p.id}')">
      <div>
        <div class="rsm-proj-name">
          <div class="rsm-chev ${isOpen?'open':''}">›</div>
          ${p.name}
          <span class="badge ${eBadge(p.estado)}" style="font-size:10px"><span class="bdot" style="background:${eCol(p.estado)}"></span>${p.estado}</span>
        </div>
        <div class="rsm-meta">
          <div class="rsm-av" style="background:${col}20;color:${col}">${gini(p.gestor)}</div>
          <span style="color:${col};font-weight:500">${p.gestor}</span>
          <span style="color:var(--border2)">·</span>
          <span>${p.fecha_inicio} → ${p.fecha_fin}</span>
        </div>
      </div>
      <div class="rsm-stats">
        <div class="rsm-stat"><div class="rsm-stat-lbl">Esperado</div><div class="rsm-stat-val" style="color:var(--text2)">${p.pct_plan}%</div></div>
        <div class="rsm-divider"></div>
        <div class="rsm-stat"><div class="rsm-stat-lbl">Real</div><div class="rsm-stat-val" style="color:${eCol(p.estado)}">${p.pct_real}%</div></div>
        <div class="rsm-divider"></div>
        <div class="rsm-stat"><div class="rsm-stat-lbl">Brecha</div><div class="rsm-stat-val" style="color:${gap>0?'var(--red)':gap<0?'var(--green)':'var(--text2)'}">${gap>0?'−':''}${Math.abs(gap)}%</div></div>
      </div>
    </div>
    <div class="rsm-roadmap">
      <div class="rsm-month-axis">${monthAxis}</div>
      ${buildRoadmapRows(p)}
    </div>
    ${isOpen?`<div class="rsm-phases">
      <div class="rsm-phases-hdr">
        <span style="padding-left:4px">Fase</span>
        <span style="text-align:right;padding-right:14px">Esp.</span>
        <span style="text-align:right;padding-right:14px">Real</span>
        <span>Estado</span>
        <span style="padding-left:4px">Gantt individual</span>
        <span style="text-align:right">Fechas</span>
      </div>
      ${phaseRows}
    </div>`:''}
  </div>`;
}

function renderResumen(){
  let filtered=projects;
  if(filterSt) filtered=filtered.filter(p=>p.estado===filterSt);
  if(filterGestor) filtered=filtered.filter(p=>p.gestor===filterGestor);
  const retrasados=filtered.filter(p=>p.estado==='Retrasada').length;
  const sheetsOn=Object.keys(SHEET_CONFIG).length>0;
  const syncBar=sheetsOn
    ?`<div class="sync-bar"><div class="sync-info">Conectado a <strong style="color:var(--text)">Google Sheets</strong> · ${projects.length} proyectos cargados</div><button class="sync-btn" onclick="loadFromSheets()">↻ Sincronizar</button></div>`
    :`<div class="sync-bar"><div class="sync-info">⚙️ <strong style="color:var(--text)">Datos de ejemplo</strong> · <span style="color:var(--accent);cursor:pointer;text-decoration:underline" onclick="showConfig()">Conecta tu Google Sheets para ver datos reales →</span></div></div>`;
  const gestores=[...new Set(projects.map(p=>p.gestor))];
  const nConformes=projects.filter(p=>p.estado==='Verde'||p.estado==='Completada').length;
  const nAlerta=projects.filter(p=>p.estado==='Amarillo').length;
  const nRetraso=projects.filter(p=>p.estado==='Retrasada').length;

  document.getElementById('view-resumen').innerHTML=`
    <div class="topbar">
      <div><h2>Resumen de proyectos</h2><p>${filtered.length} de ${projects.length} proyectos</p></div>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">Estado</span>
        <div class="filter-pills">
          <button class="pill ${filterSt===''?'pill-active':''}" onclick="setFilter('st','')">
            <span class="pill-dot" style="background:var(--text3)"></span>Todos
          </button>
          <button class="pill ${filterSt==='Verde'?'pill-active pill-green':''}" onclick="setFilter('st','Verde')">
            <span class="pill-dot" style="background:var(--green)"></span>Conforme
          </button>
          <button class="pill ${filterSt==='Amarillo'?'pill-active pill-amber':''}" onclick="setFilter('st','Amarillo')">
            <span class="pill-dot" style="background:var(--amber)"></span>Alerta
          </button>
          <button class="pill ${filterSt==='Retrasada'?'pill-active pill-red':''}" onclick="setFilter('st','Retrasada')">
            <span class="pill-dot" style="background:var(--red)"></span>Retraso
          </button>
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group">
        <span class="filter-label">Gestor</span>
        <div class="filter-pills">
          <button class="pill ${filterGestor===''?'pill-active':''}" onclick="setFilter('g','')">Todos</button>
          ${gestores.map(g=>`<button class="pill ${filterGestor===g?'pill-active':''}" onclick="setFilter('g','${g.replace(/'/g,"\\'")}')">
            <span style="width:6px;height:6px;border-radius:50%;background:${gcol(g)};display:inline-block;margin-right:3px;vertical-align:1px"></span>${g}
          </button>`).join('')}
        </div>
      </div>
      <div class="filter-stats">
        <div class="fstat fstat-green"><span>${nConformes}</span><span>Conformes</span></div>
        <div class="fstat fstat-amber"><span>${nAlerta}</span><span>Alerta</span></div>
        <div class="fstat fstat-red"><span>${nRetraso}</span><span>Retraso</span></div>
      </div>
    </div>

    ${syncBar}
    <div id="rsm-cards">${filtered.map(p=>buildProjectCard(p)).join('')}</div>`;
}

function toggleRsm(id){
  expRsm[id]=!expRsm[id];
  const p=projects.find(x=>x.id===id);
  const el=document.getElementById('card-'+id);
  if(el) el.outerHTML=buildProjectCard(p);
}

function showProject(id){

function renderDetail(){
  const p=curProj;if(!p) return;
  const alerts=[];p.fases.forEach(f=>f.tasks.forEach(t=>{if(t.atraso&&t.estado==='Retrasada')alerts.push(t);}));
  const totalT=p.fases.reduce((a,f)=>a+f.tasks.length,0);
  const doneT=p.fases.reduce((a,f)=>a+f.tasks.filter(t=>t.estado==='Completada').length,0);
  const lateT=p.fases.reduce((a,f)=>a+f.tasks.filter(t=>t.estado==='Retrasada').length,0);
  const gap=p.pct_plan-p.pct_real,col=gcol(p.gestor);
  const months=getProjectMonths(p),today=p.today_pct||50;

  const alertHtml=alerts.length?`<div class="alert-box">
    <div class="alert-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4m0 4h.01"/></svg>${alerts.length} actividad${alerts.length>1?'es':''} con atraso crítico</div>
    ${alerts.map(t=>`<div class="alert-item"><span style="font-family:'DM Mono',monospace;font-size:10px;opacity:.65">${t.edt}</span> · ${t.name} <span style="margin-left:5px;padding:1px 6px;background:rgba(239,68,68,.18);border-radius:8px;font-size:10px">${t.atraso}</span></div>`).join('')}
  </div>`:'';

  const ganttRows=p.fases.map((f,fi)=>{
    const isOpen=expPhase[f.id];
    const rw=f.pct_plan>0?Math.round((f.pct_real/f.pct_plan)*f.dur):0;
    const fc=faseColor(f.name,f.estado,fi);
    const taskRows=isOpen?`<div class="task-rows">${f.tasks.map(t=>`
      <div class="task-row">
        <div class="task-name-cell">
          <span class="task-edt">${t.edt}</span>
          <span class="task-name ${t.estado==='Retrasada'?'late':''}">${t.name}</span>
          ${t.atraso?`<span class="task-chip">${t.atraso}</span>`:''}
        </div>
        <div class="pct-cell pct-muted">${t.pct_plan}%</div>
        <div class="pct-cell ${pCls(t.estado,t.pct_plan,t.pct_real)}">${t.pct_real}%</div>
        <div class="st-cell"><span class="badge ${eBadge(t.estado)}" style="font-size:9px;padding:2px 6px">${t.estado}</span></div>
        <div style="padding:0 3px"><div class="g-track">
          <div class="g-plan" style="left:${f.start_off}%;width:${f.dur}%"></div>
          <div class="g-real" style="left:${f.start_off}%;width:${t.pct_plan>0?Math.round((t.pct_real/Math.max(t.pct_plan,1))*f.dur):0}%;background:${eBarC(t.estado)}"></div>
        </div></div>
        <div style="text-align:right;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${t.start}→${t.end}</div>
      </div>`).join('')}</div>`:'';
    return `<div class="phase-block">
      <div class="phase-hdr" onclick="togglePhase('${f.id}')">
        <div class="ph-name-cell">
          <div class="ph-chev ${isOpen?'open':''}">›</div>
          <div style="width:10px;height:10px;border-radius:3px;background:${fc};flex-shrink:0"></div>
          <span class="ph-name">${f.id} · ${f.name}</span>
        </div>
        <div class="pct-cell pct-muted">${f.pct_plan}%</div>
        <div class="pct-cell ${pCls(f.estado,f.pct_plan,f.pct_real)}">${f.pct_real}%</div>
        <div class="st-cell"><span class="badge ${eBadge(f.estado)}"><span class="bdot" style="background:${eCol(f.estado)}"></span>${f.estado}</span></div>
        <div style="padding:0 3px"><div class="g-track">
          <div class="g-plan" style="left:${f.start_off}%;width:${f.dur}%"></div>
          <div class="g-real" style="left:${f.start_off}%;width:${rw}%;background:${fc}"></div>
          <div class="g-today-l" style="left:${today}%"></div>
        </div></div>
        <div style="text-align:right;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${p.fecha_inicio.slice(0,5)}</div>
      </div>${taskRows}</div>`;
  }).join('');

  document.getElementById('view-detail').innerHTML=`
    <div class="back-btn" onclick="showResumen()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Volver al resumen
    </div>
    <div class="detail-hdr">
      <div class="dh-top">
        <div>
          <div class="dh-name">${p.name}</div>
          <div class="dh-sub">
            <span style="width:20px;height:20px;border-radius:50%;background:${col}20;color:${col};font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${gini(p.gestor)}</span>
            <span style="color:${col};font-weight:500">${p.gestor}</span>
            <span style="color:var(--text3)">·</span>
            <span>${p.fecha_inicio} → ${p.fecha_fin}</span>

      </div>
      <div class="dh-stats">
        <div class="dh-stat"><div class="dh-stat-lbl">Avance esperado</div><div class="dh-stat-val" style="color:var(--text2)">${p.pct_plan}%</div></div>
        <div class="dh-stat"><div class="dh-stat-lbl">Avance real</div><div class="dh-stat-val" style="color:${eCol(p.estado)}">${p.pct_real}%</div></div>
        <div class="dh-stat"><div class="dh-stat-lbl">Brecha</div><div class="dh-stat-val" style="color:${gap>0?'var(--red)':'var(--green)'}">${gap>0?'−':'+'}${Math.abs(gap)}%</div></div>
      </div>
    </div>
    ${alertHtml}
    <div class="section-lbl">Cronograma detallado — clic en cada fase para ver tareas</div>
    <div style="display:flex;justify-content:space-between;padding:0 18px;margin-bottom:4px">
      ${months.map(m=>`<span style="font-size:9px;color:var(--text3);font-weight:500">${m.label}</span>`).join('')}
    </div>
    <div class="gantt-wrap">
      <div class="gantt-thead">
        <span>Fase / Tarea</span>
        <span style="text-align:right;padding-right:14px">Esp.</span>

// ══ CSV PARSER ══
async function loadFromSheets(){
  const entries=Object.entries(SHEET_CONFIG);if(!entries.length)return;
  // CORS proxies — tries each one in order until one works
  const PROXIES=[
    url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
    url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url=>`https://cors-anywhere.herokuapp.com/${url}`,
  ];
  const all=[];
  for(const [name,url] of entries){
    let loaded=false;
    for(const proxy of PROXIES){
      try{
        const r=await fetch(proxy(url),{headers:{'X-Requested-With':'XMLHttpRequest'}});
        if(!r.ok) continue;
        const csv=await r.text();
        if(csv.includes(',')&&csv.length>50){
          const parsed=parseCSV(csv);
          if(parsed.length){all.push(...parsed);loaded=true;break;}
        }
      }catch(e){continue;}
    }
    if(!loaded) console.warn('No se pudo cargar:',name);
  }
  if(all.length){
    projects=all;
    document.getElementById('sb-source').textContent='Google Sheets conectado';
    document.getElementById('sb-date').textContent=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  }
  buildSidebar();
  if(curView==='resumen')renderResumen();else if(curView==='portfolio')renderPortfolio();
}
function parseCSV(csv){
  const lines=csv.trim().split('\n');
  const headers=lines[0].split('\t').map(h=>h.trim());
  const col=name=>headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
  const iEDT=col('EDT'),iNombre=col('Nombre'),iPlan=col('esperado'),iReal=col('completado'),iEstado=col('Estado'),iStart=col('Comienzo'),iEnd=col('Fin'),iRes=col('recursos');
  const pct=v=>parseInt((v||'0').replace('%','').trim())||0;
  const clean=v=>(v||'').trim();
  let project=null,currentFase=null;const projs=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split('\t');if(cols.length<3)continue;
    const edt=clean(cols[iEDT]),nombre=clean(cols[iNombre]);if(!edt||!nombre)continue;
    const isRoot=/^\d+$/.test(edt);const isPhase=/^\d+\.\d+$/.test(edt)&&edt.split('.').length===2;
    if(isRoot){
      project={id:'p_'+edt,name:nombre,gestor:clean(cols[iRes]).split(';')[0].trim().replace(/\.$/,''),pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),estado:clean(cols[iEstado]),fecha_inicio:clean(cols[iStart]),fecha_fin:clean(cols[iEnd]),today_pct:50,fases:[]};
      projs.push(project);currentFase=null;
    }else if(project){
      if(isPhase){currentFase={id:edt,name:nombre,estado:clean(cols[iEstado]),pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),start_off:0,dur:20,tasks:[]};project.fases.push(currentFase);}
      else if(currentFase){const g=pct(cols[iPlan])-pct(cols[iReal]);currentFase.tasks.push({edt,name:nombre,estado:clean(cols[iEstado]),pct_plan:pct(cols[iPlan]),pct_real:pct(cols[iReal]),start:clean(cols[iStart]),end:clean(cols[iEnd]),atraso:clean(cols[iEstado])==='Retrasada'&&g>0?`-${g}%`:''});}
    }
  }
  return projs;
}
